<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SheGuard AI+ Login</title>
    <link rel="stylesheet" href="/static/style.css">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #0b1220, #111827);
            color: white;
        }

        .login-container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: #1f2937;
            padding: 30px;
            border-radius: 15px;
            width: 320px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.5);
        }

        .login-box h1 {
            text-align: center;
            margin-bottom: 10px;
        }

        .login-box p {
            text-align: center;
            font-size: 12px;
            color: #aaa;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            border-radius: 8px;
            border: none;
            background: #3b82f6;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }

        .google {
            background: #ef4444;
        }

        .google:hover {
            background: #dc2626;
        }

    </style>

</head>

<body>

<div class="login-container">

    <div class="login-box">

        <h1>🛡 SheGuard AI+</h1>
        <p>Smart Women Safety System</p>

        <!-- Flask POST LOGIN -->
        <form method="POST">
            <input type="text" name="email" placeholder="Email / Phone" required>
            <input type="password" placeholder="Password" required>

            <button type="submit">Login</button>
        </form>

        <!-- MOCK GOOGLE LOGIN -->
        <button class="google" onclick="googleLogin()">Continue with Google</button>

    </div>

</div>

<script>
function googleLogin(){
    alert("Google Login Successful (Mock)");
    window.location.href = "/home";
}
</script>

</body>
</html>
